<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Viewer</title>

<style>
body{
    margin:0;
    min-height:100vh;
    font-family:system-ui, sans-serif;

    background:
        radial-gradient(circle at 20% 20%, #1b2140, transparent 40%),
        radial-gradient(circle at 80% 60%, #16253a, transparent 40%),
        #0f1117;

    color:white;
    padding:30px;
}

/* VIEWER */

.viewer{
    display:flex;
    flex-direction:column;
    gap:18px;

    background:#1a1d26;
    border-radius:28px;
    padding:36px;

    border:1px solid rgba(255,255,255,.06);

    box-shadow:
        0 40px 80px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.04);
}

/* HERO */

.hero{
    display:flex;
    gap:26px;
    align-items:center;
    flex-wrap:wrap;
}

.hero img{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
}

.name{
    font-size:36px;
    font-weight:900;
}

.tags{
    margin-top:8px;
    font-size:14px;
    opacity:.7;
}

/* SECTIONS */

.section{
    padding:20px;
    border-radius:18px;

    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);
}

.section-title{
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
    opacity:.55;
    margin-bottom:10px;
}

.big-text{
    font-size:15px;
    line-height:1.7;
    white-space:pre-wrap;
}

/* STAT ROW */

.stat-row{
    display:flex;
    justify-content:space-between;
    padding:10px 14px;
    margin-bottom:8px;

    border-radius:12px;
    background:rgba(255,255,255,0.03);
}

.stat-label{
    font-size:12px;
    opacity:.6;
}

.stat-value{
    font-weight:600;
}

/* RELATIONSHIP CHIP */

.relationship-chip{
    display:inline-block;
    padding:6px 12px;
    margin:4px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
}

/* FORMS TABLE */

.form-table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

.form-table th{
  text-align:left;
  opacity:.6;
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.form-table td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.form-table tr:hover{
  background:rgba(255,255,255,.03);
}

/* BACKGROUND PANEL */

.bgPanel{
    max-width:780px;
    margin:0 auto 20px;
    padding:20px;
    border-radius:18px;
    background:rgba(255,255,255,.05);
}

.bgRow{
    display:grid;
    grid-template-columns:80px 1fr;
    gap:10px;
    margin-bottom:10px;
}

/* GALLERY GRID */

.gallery-grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap:10px;
}

.gallery-item{
  width:100%;
  aspect-ratio:1/1;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  background:rgba(255,255,255,.05);
  transition:.2s;
}

.gallery-item:hover{
  transform:scale(1.05);
}

.gallery-item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LIGHTBOX */

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}

.lightbox.active{
  display:flex;
}

</style>
</head>

<body>

<!-- BACKGROUND CONTROLS -->

<div class="bgPanel">
  <div class="bgRow">
    <label>Color A</label>
    <input type="color" id="gradA" value="#1a1d26">
  </div>

  <div class="bgRow">
    <label>Color B</label>
    <input type="color" id="gradB" value="#5aa2ff">
  </div>
</div>

<!-- VIEWER -->

<div class="viewer" id="viewerCard">

  <div class="hero">
    <img id="vImage">
    <div>
      <div class="name" id="vName"></div>
      <div class="tags" id="vTags"></div>
    </div>
  </div>

<div class="section" id="gallerySection">
  <div class="section-title">Gallery</div>
  <div class="gallery-grid" id="vGallery"></div>
</div>

<div id="lightbox" class="lightbox">
  <img id="lightboxImg">
</div>

  <div class="section">
    <div class="section-title">Description</div>
    <div class="big-text" id="vDesc"></div>
  </div>

  <div class="section" id="formsSection">
    <div class="section-title">Forms</div>
    <div id="vForms"></div>
  </div>

  <div class="section">
    <div class="section-title">Details</div>
    <div id="vDetails"></div>
  </div>

  <div class="section">
    <div class="section-title">Relationships</div>
    <div id="vRelationships"></div>
  </div>

  <div class="section" id="abilitiesSection">
    <div class="section-title">Abilities</div>
    <div id="vAbilities"></div>
  </div>

</div>

<script>

/* LOAD */

const chars = JSON.parse(localStorage.getItem("characters")) || [];
const viewingId = localStorage.getItem("viewingCharacterId");

const char = chars.find(c => c.id === viewingId);

if(!char){
  alert("Character not found");
  location.href = "character.html";
}

/* ELEMENTS */

const viewer = document.getElementById("viewerCard");

const vImage = document.getElementById("vImage");
const vName = document.getElementById("vName");
const vTags = document.getElementById("vTags");
const vDesc = document.getElementById("vDesc");
const vForms = document.getElementById("vForms");
const vDetails = document.getElementById("vDetails");
const vRelationships = document.getElementById("vRelationships");
const vAbilities = document.getElementById("vAbilities");
const abilitiesSection = document.getElementById("abilitiesSection");

/* BASIC */

vImage.src = char.image || "";
vName.textContent = char.name || "Unnamed";
vTags.textContent = char.tags || "-";
vDesc.textContent = char.desc || "-";

/* DETAILS */

function statRow(label,value){
  return `
  <div class="stat-row">
    <span class="stat-label">${label}</span>
    <span class="stat-value">${value || "-"}</span>
  </div>`;
}

vDetails.innerHTML =
  statRow("Species", char.species) +
  statRow("Origin", char.origin) +
  statRow("Faction", char.faction) +
  statRow("Alignment", char.alignment) +
  statRow("Status", char.status) +
  statRow("Age", char.age);

/* FORMS */

if(!char.forms || char.forms.length === 0){
  document.getElementById("formsSection").style.display = "none";
} else {
  vForms.innerHTML = `
    <table class="form-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody>
        ${char.forms.map(f => `
          <tr>
            <td>${f.name || "-"}</td>
            <td>${f.type || "-"}</td>
            <td>${f.notes || "-"}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

/* RELATIONSHIPS */

function chip(text){
  return `<span class="relationship-chip">${text}</span>`;
}

vRelationships.innerHTML =
  (char.relationships || [])
  .map(r => chip(`${r.name} — ${r.type}`))
  .join("") || "None";

/* ABILITIES */

if(!char.abilities || char.abilities.length === 0){
  abilitiesSection.style.display = "none";
} else {
  vAbilities.innerHTML = char.abilities.map(a => `
    <div class="stat-row">
      <div>
        <div style="font-weight:600">${a.name}</div>
        <div style="font-size:12px;opacity:.6">${a.type || ""}</div>
      </div>
    </div>
    <div style="margin-bottom:12px;">
      ${a.description || ""}
    </div>
  `).join("");
}

/* BACKGROUND */

const gradA = document.getElementById("gradA");
const gradB = document.getElementById("gradB");

function applyGradient(){
  viewer.style.background =
    `linear-gradient(135deg, ${gradA.value}, ${gradB.value})`;
}

gradA.oninput = applyGradient;
gradB.oninput = applyGradient;

applyGradient();


/* =================== GALLERY =================== */

const vGallery = document.getElementById("vGallery");
const gallerySection = document.getElementById("gallerySection");

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");

/* LOAD GLOBAL GALLERY */
const allImages = JSON.parse(localStorage.getItem("gallery")) || [];

/* FILTER BY CHARACTER */
const charImages = allImages.filter(img => img.characterId === char.id);

/* RENDER */

if(charImages.length === 0){
  gallerySection.style.display = "none";
} else {
  vGallery.innerHTML = charImages.map(img => `
    <div class="gallery-item">
      <img src="${img.src}">
    </div>
  `).join("");
}

/* LIGHTBOX */

vGallery.addEventListener("click", e => {
  const img = e.target.closest("img");
  if(!img) return;

  lightboxImg.src = img.src;
  lightbox.classList.add("active");
});

lightbox.onclick = () => {
  lightbox.classList.remove("active");
};


</script>

</body>
</html>
